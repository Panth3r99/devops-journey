name: DevOps Monitoring Pipeline

on:
  push:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes

jobs:

  network-monitor:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Run network monitor (no Docker)
        run: |
          chmod +x check_server.sh
          ./check_server.sh || true


  system-monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and run system monitor (Docker)
        run: |
          docker build -t system-monitor . || true
          docker run system-monitor || true

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: system-monitor-logs
          path: system_monitor.log
